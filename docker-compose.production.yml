# ═══════════════════════════════════════════════════════════════════════════════
# TMS Production — Client Mini-PC Deployment
# ═══════════════════════════════════════════════════════════════════════════════
#
# Runs on the client's Intel N150 / 16 GB / 1 TB Ubuntu 24.04 box.
# Hardware-aware: resource limits and CPU pinning are sized for 4 physical
# cores and keep ~6 GB headroom with the chatbot OFF.
#
# ── Daily operation ───────────────────────────────────────────────────────────
# Default (chatbot OFF, predictions ON):
#     docker compose -f docker-compose.production.yml up -d
#
# Need the chatbot for a session (flip setting first, then start container):
#     scripts/chatbot.sh on
#     # ...use it...
#     scripts/chatbot.sh off
#
# The chatbot lives behind Compose `profiles: ["ollama"]`, so it is not started,
# built, or even validated on `docker compose up` unless the profile is active.
# The backend short-circuits /api/ai/chat with 503 when `aiChatbotEnabled=false`
# in AppSettings (see backend/src/middleware/ai-toggle.middleware.ts), so a
# stale request will not hang while the container is stopped.
#
# ── Data layout on the host (bind mounts) ─────────────────────────────────────
#     /opt/tms/data/postgres   ← Postgres cluster (owned by UID 999)
#     /opt/tms/data/uploads    ← logos, stamps, order PDFs    (owned by UID 1000)
#     /opt/tms/data/backups    ← nightly .tar.gz backups      (owned by UID 1000)
#     /opt/tms/data/ollama     ← model cache (only used when profile:ollama)
#
# Bind mounts are used instead of named volumes because they write straight
# to the NVMe filesystem with no Overlay2 copy-on-write overhead — the right
# choice for a low-power N150 where every syscall matters. The paths are
# pre-created with correct ownership by the first-deploy SOP (Phase H).
#
# ── Secrets ────────────────────────────────────────────────────────────────────
# Secrets are read from .env.production, which MUST be generated on the host
# via scripts/generate-production-secrets.sh and MUST NOT be committed to git.
# ═══════════════════════════════════════════════════════════════════════════════

name: tms-production

services:
  # ── Postgres 17 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: tms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-tms_db}
    volumes:
      - /opt/tms/data/postgres:/var/lib/postgresql/data
    networks:
      - tms_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-tms_user} -d ${DB_NAME:-tms_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    cpuset: "0,1"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"
        reservations:
          memory: 512m

  # ── Express + TypeScript backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: tms-backend:latest
    container_name: tms_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-tms_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tms_db}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT: 3001
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVER_URL: ${SERVER_URL:?SERVER_URL is required (e.g. https://tms.client.ro)}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required (e.g. https://tms.client.ro)}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-admin@tms.ro}
      SEED_USER_NAME: ${SEED_USER_NAME:-Admin TMS}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:?SEED_USER_PASSWORD is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:?WEBAUTHN_RP_ID is required (e.g. tms.client.ro)}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-TMS Transport}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:?WEBAUTHN_ORIGIN is required (e.g. https://tms.client.ro)}
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      # AI — Python API is always on; Ollama may or may not be up.
      # The /api/ai/chat route is gated on `aiChatbotEnabled` so Ollama being
      # unreachable does NOT cause hung requests; see ai-toggle.middleware.ts.
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      PYTHON_API_URL: ${PYTHON_API_URL:-http://python-api:8000}
      PYTHON_API_SECRET: ${PYTHON_API_SECRET:?PYTHON_API_SECRET is required}
      AI_PRIMARY_PROVIDER: ${AI_PRIMARY_PROVIDER:-ollama}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-none}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      TZ: ${TZ:-Europe/Bucharest}
      # Backups — remote storage is REQUIRED in production.
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:?BACKUP_S3_ENDPOINT is required}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:?BACKUP_S3_BUCKET is required}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:?BACKUP_S3_REGION is required}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:?BACKUP_S3_ACCESS_KEY is required}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:?BACKUP_S3_SECRET_KEY is required}
      BACKUP_REMOTE_REQUIRED: ${BACKUP_REMOTE_REQUIRED:-true}
    volumes:
      - /opt/tms/data/uploads:/app/uploads
      - /opt/tms/data/backups:/app/backups
    networks:
      - tms_network
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    cpuset: "0,1"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m

  # ── React SPA served by nginx:alpine ───────────────────────────────────────
  # Bound to 127.0.0.1 only. Host Nginx (certbot path) or Cloudflare Tunnel
  # (fallback path) reverse-proxies public HTTPS to this port.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: tms-frontend:latest
    container_name: tms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tms_network
    cpuset: "2,3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ── Python FastAPI — scikit-learn ML predictions (always on) ───────────────
  # Always running: this backs /api/ai/predictions + /api/ai/vehicle-finance.
  # Lightweight (~768 MB steady state), cheap CPU (matmul on small tables).
  # NOT behind a profile — the client uses these features from day one.
  python-api:
    build:
      context: ./python-api
      dockerfile: Dockerfile
    image: tms-python-api:latest
    container_name: tms_python_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-tms_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tms_db}"
      PORT: 8000
      API_SECRET: ${PYTHON_API_SECRET:?PYTHON_API_SECRET is required}
    networks:
      - tms_network
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://127.0.0.1:8000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    cpuset: "2,3"
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.5"
        reservations:
          memory: 256m

  # ── Uptime Kuma (internal monitoring, not public) ──────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: tms_uptime_kuma
    restart: unless-stopped
    volumes:
      - /opt/tms/data/uptime-kuma:/app/data
    ports:
      - "3003:3001"
    networks:
      - tms_network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ── Ollama (opt-in via profile:ollama) ─────────────────────────────────────
  # NOT started on `docker compose up -d` — start it on-demand with
  # `scripts/chatbot.sh on` or `docker compose --profile ollama up -d ollama`.
  # When stopped, ~5 GB of RAM is freed. The model cache is persisted in
  # /opt/tms/data/ollama so subsequent starts do not re-download.
  ollama:
    image: ollama/ollama:latest
    container_name: tms_ollama
    restart: unless-stopped
    profiles:
      - ollama
    environment:
      OLLAMA_PORT: 11434
      # Cap the KV cache; keeps memory predictable on a 16 GB box.
      OLLAMA_KV_CACHE_TYPE: q8_0
    volumes:
      - /opt/tms/data/ollama:/root/.ollama
    networks:
      - tms_network
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    # Pin Ollama to the "back" 2 cores when it IS running, so backend
    # (cores 0-1) is not starved during inference.
    cpuset: "2,3"
    deploy:
      resources:
        limits:
          memory: 5g
          cpus: "2.0"
        reservations:
          memory: 3g

networks:
  tms_network:
    driver: bridge
    name: tms_network

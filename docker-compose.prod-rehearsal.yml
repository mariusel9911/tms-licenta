# ═══════════════════════════════════════════════════════════════════════════════
# TMS Production Rehearsal Stack — Homelab Mirror
# ═══════════════════════════════════════════════════════════════════════════════
#
# Purpose: validate every production deploy BEFORE the client mini-PC sees it.
# This stack uses the same docker-compose.production.yml configuration (services,
# limits, healthchecks, Ollama profile) with only container names, network, data
# dirs, and ports changed so it can run alongside staging + diploma on the
# homelab simultaneously.
#
# Trigger via GitHub Actions (manual only):
#     Actions → "Deploy to Prod-Rehearsal" → Run workflow → type "deploy"
# Or locally:
#     docker compose -f docker-compose.prod-rehearsal.yml --env-file .env.rehearsal up -d
#
# Public URL (Cloudflare Tunnel):
#     https://rehearsal.mauriceconnect.org → 127.0.0.1:8083
#
# Data layout on the homelab (bind mounts):
#     /opt/tms/data-rehearsal/postgres   (owned by UID 999)
#     /opt/tms/data-rehearsal/uploads    (owned by UID 1000)
#     /opt/tms/data-rehearsal/backups    (owned by UID 1000)
#     /opt/tms/data-rehearsal/ollama     (only when profile:ollama active)
#     /opt/tms/data-rehearsal/uptime-kuma
#
# No CPU pinning (cpuset) — the homelab has more cores and runs multiple stacks.
# Memory limits match production so OOM behaviour is representative.
# ═══════════════════════════════════════════════════════════════════════════════

name: tms-rehearsal

services:
  # ── Postgres 17 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: rehearsal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-tms_db}
    volumes:
      - /opt/tms/data-rehearsal/postgres:/var/lib/postgresql/data
    networks:
      - rehearsal_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-tms_user} -d ${DB_NAME:-tms_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"
        reservations:
          memory: 512m

  # ── Express + TypeScript backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: tms-backend:rehearsal
    container_name: rehearsal_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-tms_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tms_db}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT: 3001
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVER_URL: ${SERVER_URL:?SERVER_URL is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-admin@tms.ro}
      SEED_USER_NAME: ${SEED_USER_NAME:-Admin TMS}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:?SEED_USER_PASSWORD is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      RATE_LIMIT_ENABLED: "true"
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:?WEBAUTHN_RP_ID is required}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-TMS Rehearsal}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:?WEBAUTHN_ORIGIN is required}
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      PYTHON_API_URL: ${PYTHON_API_URL:-http://python-api:8000}
      PYTHON_API_SECRET: ${PYTHON_API_SECRET:?PYTHON_API_SECRET is required}
      AI_PRIMARY_PROVIDER: ${AI_PRIMARY_PROVIDER:-ollama}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-none}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      TZ: ${TZ:-Europe/Bucharest}
      # Backups — remote storage is optional on rehearsal (can test with rehearsal R2 bucket)
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      # BACKUP_REMOTE_REQUIRED is intentionally absent on rehearsal (local backups allowed)
    volumes:
      - /opt/tms/data-rehearsal/uploads:/app/uploads
      - /opt/tms/data-rehearsal/backups:/app/backups
    networks:
      - rehearsal_network
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m

  # ── React SPA served by nginx:alpine ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: tms-frontend:rehearsal
    container_name: rehearsal_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8083:80"
    volumes:
      - ./nginx/prod-rehearsal.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - rehearsal_network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ── Python FastAPI — scikit-learn ML predictions (always on) ───────────────
  python-api:
    build:
      context: ./python-api
      dockerfile: Dockerfile
    image: tms-python-api:rehearsal
    container_name: rehearsal_python_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-tms_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tms_db}"
      PORT: 8000
      API_SECRET: ${PYTHON_API_SECRET:?PYTHON_API_SECRET is required}
    networks:
      - rehearsal_network
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://127.0.0.1:8000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.5"
        reservations:
          memory: 256m

  # ── Uptime Kuma (internal monitoring) ─────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: rehearsal_uptime_kuma
    restart: unless-stopped
    volumes:
      - /opt/tms/data-rehearsal/uptime-kuma:/app/data
    ports:
      - "3004:3001"
    networks:
      - rehearsal_network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ── Ollama (opt-in via profile:ollama) — same as production ───────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rehearsal_ollama
    restart: unless-stopped
    profiles:
      - ollama
    environment:
      OLLAMA_PORT: 11434
      OLLAMA_KV_CACHE_TYPE: q8_0
    volumes:
      - /opt/tms/data-rehearsal/ollama:/root/.ollama
    networks:
      - rehearsal_network
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 5g
          cpus: "2.0"
        reservations:
          memory: 3g

networks:
  rehearsal_network:
    driver: bridge
    name: rehearsal_network
